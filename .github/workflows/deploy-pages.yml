name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate build config from secret
        env:
          CONFIG_DEV_JSON: ${{ secrets.CONFIG_DEV_JSON }}
        run: |
          if [ -z "$CONFIG_DEV_JSON" ]; then
            echo "CONFIG_DEV_JSON secret is missing or empty."
            exit 1
          fi

          mkdir -p configs
          printf '%s' "$CONFIG_DEV_JSON" > configs/config.dev.json

      - name: Validate build config JSON
        run: jq -e . configs/config.dev.json > /dev/null

      - name: Build Flutter web app
        run: flutter build web --release --base-href /flutter-news-app/ --dart-define-from-file=configs/config.dev.json

      - name: Add GitHub Pages SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
