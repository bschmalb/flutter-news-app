name: ksta
description: KSTA case study app.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.11.1 <4.0.0"

dependencies:
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.1
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  http: ^1.5.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.10.4
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.2.0
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
